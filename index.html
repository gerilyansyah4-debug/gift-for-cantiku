<!DOCTYPE html>

<html lang="id">

<head>
<meta charset="UTF-8">
<title>Untuk Cantikku ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* INTRO */

#intro{
position:absolute;
font-size:70px;
font-weight:bold;
color:#ff4d6d;
text-shadow:0 0 20px #ff4d6d;
animation:fadeIntro 4s forwards;
}

@keyframes fadeIntro{
0%{opacity:0;transform:scale(0.5);}
50%{opacity:1;transform:scale(1);}
100%{opacity:0;}
}

/* HALAMAN PEMBUKA */

#welcome{
display:none;
flex-direction:column;
align-items:center;
}

#welcome h1{
font-size:40px;
margin-bottom:30px;
}

/* BUTTON */

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(255,0,100,0.7);
}

button:hover{
background:#ff3355;
}

/* HALAMAN PESAN */

#pesan{
display:none;
flex-direction:column;
align-items:center;
}

img{
width:260px;
max-width:80%;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 25px rgba(255,255,255,0.6);
}

#text{
font-size:26px;
max-width:700px;
white-space:pre-line;
margin-top:20px;
}

/* HATI JATUH */

.heart{
position:absolute;
color:red;
font-size:25px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* SHOOTING STAR */

.shooting{
position:absolute;
width:2px;
height:100px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 1s linear;
}

@keyframes shoot{
0%{opacity:1;transform:translate(0,0) rotate(45deg);}
100%{opacity:0;transform:translate(300px,300px) rotate(45deg);}
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">I LOVE YOU ❤️</div>

<!-- HALAMAN PEMBUKA -->

<div id="welcome">

<h1>I HAVE A MESSAGE FOR YOU ❤️</h1>

<button onclick="start()">Open it</button>

</div>

<!-- HALAMAN PESAN -->

<div id="pesan">

<img src="WhatsApp Image 2026-03-07 at 23.38.39.jpeg">

<div id="text"></div>

</div>

<audio id="music" loop>
<source src="SZA - Saturn.mp3" type="audio/mpeg">
</audio>

<script>

/* TAMPILKAN HALAMAN WELCOME SETELAH INTRO */

setTimeout(()=>{

document.getElementById("intro").style.display="none"

document.getElementById("welcome").style.display="flex"

},4000)

/* PESAN */

const message = `For sayangku yang paling cantik sedunia ❤️

Sayang, aku cuma ingin bilang terimakasih.
Karena kamu masih kasih aku kesempatan,
kesempatan buat jadi orang yang lebih baik lagi.

Walaupun aku pernah bikin kamu kecewa,
kamu masih percaya sama aku.

Aku ga mau janji yang aneh-aneh,
tapi aku bakal selalu berusaha
jadi yang terbaik buat kamu.

Karena kamu se-worth it itu
buat diperjuangkan.

Dan untuk semua kesalahanku dulu,
I am very very sorry.

Terimakasih banyak ya sayang ❤️

Love u more than anything.`

let i=0

function typeText(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i)

i++

setTimeout(typeText,40)

}

}

/* START */

function start(){

document.getElementById("welcome").style.display="none"

document.getElementById("pesan").style.display="flex"

const music=document.getElementById("music")

music.currentTime=50

music.play()

typeText()

}

/* HATI JATUH */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},5000)

}

setInterval(createHeart,150)

/* SHOOTING STAR */

function shootingStar(){

const star=document.createElement("div")

star.className="shooting"

star.style.left=Math.random()*window.innerWidth+"px"

star.style.top=Math.random()*200+"px"

document.body.appendChild(star)

setTimeout(()=>{

star.remove()

},1000)

}

setInterval(shootingStar,4000)

/* BACKGROUND BINTANG */

const canvas=document.getElementById("stars")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth

canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*2,

speed:Math.random()*0.3

})

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(star=>{

ctx.beginPath()

ctx.arc(star.x,star.y,star.size,0,Math.PI*2)

ctx.fill()

star.y+=star.speed

if(star.y>canvas.height){

star.y=0

star.x=Math.random()*canvas.width

}

})

requestAnimationFrame(drawStars)

}

drawStars()

</script>

</body>
</html>
