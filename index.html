```html
<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Untuk Cantikku ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* OPENING */

#opening{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#countdown{
font-size:120px;
font-weight:bold;
text-shadow:0 0 30px pink;
}

#nama{
display:none;
font-size:60px;
color:pink;
text-shadow:0 0 25px pink;
margin-top:20px;
}

/* READY PAGE */

#ready{
display:none;
flex-direction:column;
align-items:center;
}

#ready h1{
font-size:40px;
margin-bottom:30px;
}

/* BUTTON */

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(255,0,100,0.7);
margin:10px;
}

button:hover{
background:#ff3355;
}

/* HUJAN HATI */

.pinkHeart{
position:absolute;
color:pink;
font-size:24px;
animation:fallPink 4s linear infinite;
}

@keyframes fallPink{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* BOOK */

#book{
display:none;
flex-direction:column;
align-items:center;
}

.slide{
display:none;
flex-direction:column;
align-items:center;
}

.slide.active{
display:flex;
}

.slide img{
width:300px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

.slide p{
font-size:24px;
margin-top:20px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- OPENING -->

<div id="opening">

<div id="countdown">3</div>

<div id="nama">For Cantikuuuuu 💗</div>

</div>

<!-- READY -->

<div id="ready">

<h1>Are you ready?</h1>

<button onclick="openBook()">YES</button>
<button id="noBtn">NO</button>

</div>

<!-- BOOK -->

<div id="book">

<div class="slide active">
<img src="WhatsApp Image 2026-03-07 at 23.38.39.jpeg">
<p>Kenangan pertama kita ❤️</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.51.jpeg">
<p>Aku selalu bahagia kalau sama kamu</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.52.jpeg">
<p>Kamu selalu cantik di mataku</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.53.jpeg">
<p>Terima kasih sudah bertahan</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.56.jpeg">
<p>Aku sayang kamu</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.57.jpeg">
<p>Kamu sangat berarti buat aku</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.58.jpeg">
<p>Aku tidak mau kehilangan kamu</p>
</div>

<div class="slide">
<img src="WhatsApp Image 2026-03-08 at 13.25.59.jpeg">
<p>Mau jadi kekasihku lagi?</p>
</div>

<button onclick="nextSlide()">Next</button>

</div>

<!-- MUSIK -->

<audio id="music" loop>
<source src="SZA - Saturn.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSIK */

window.onload=()=>{
document.getElementById("music").play()
}

/* HUJAN HATI */

function pinkHeart(){

const heart=document.createElement("div")

heart.className="pinkHeart"

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},4000)

}

setInterval(pinkHeart,200)

/* COUNTDOWN */

let num=3

const timer=setInterval(()=>{

document.getElementById("countdown").innerText=num

num--

if(num<0){

clearInterval(timer)

document.getElementById("countdown").style.display="none"

document.getElementById("nama").style.display="block"

setTimeout(()=>{

document.getElementById("opening").style.display="none"

document.getElementById("ready").style.display="flex"

},3000)

}

},1000)

/* NO KABUR */

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{

noBtn.style.position="absolute"

noBtn.style.left=Math.random()*80+"%"

noBtn.style.top=Math.random()*80+"%"

})

/* OPEN BOOK */

function openBook(){

document.getElementById("ready").style.display="none"

document.getElementById("book").style.display="flex"

}

/* SLIDE */

let slides=document.querySelectorAll(".slide")

let currentSlide=0

function nextSlide(){

slides[currentSlide].classList.remove("active")

currentSlide++

if(currentSlide >= slides.length){

alert("Cerita kita belum selesai ❤️")

return

}

slides[currentSlide].classList.add("active")

}

/* BINTANG */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3
})

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(star=>{

ctx.beginPath()
ctx.arc(star.x,star.y,star.size,0,Math.PI*2)
ctx.fill()

star.y+=star.speed

if(star.y>canvas.height){
star.y=0
star.x=Math.random()*canvas.width
}

})

requestAnimationFrame(drawStars)

}

drawStars()

</script>

</body>
</html>
